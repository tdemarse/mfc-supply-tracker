<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MFC Supply Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#8c1515;--red-dk:#6a0f0f;--black:#111;--g900:#1a1a1a;--g800:#2a2a2a;
  --g700:#3a3a3a;--g600:#555;--g400:#999;--g200:#e5e5e5;--g100:#f5f5f5;--white:#fff;
  --warn:#d97706;--warn-bg:#fffbeb;--danger:#dc2626;--danger-bg:#fef2f2;
  --ok:#16a34a;--ok-bg:#f0fdf4;
  --font:'Inter','Segoe UI',system-ui,sans-serif;--mono:'Consolas',monospace;
}
body{font-family:var(--font);background:var(--g100);color:var(--black);min-height:100vh}

/* HEADER */
header{background:var(--black);color:#fff;padding:0 20px;display:flex;align-items:center;
  gap:12px;height:54px;border-bottom:3px solid var(--red);position:sticky;top:0;z-index:50}
.logo{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--red)}
.logo span{color:#fff}
header h1{font-size:15px;font-weight:600}
.header-right{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.tab-btn{background:none;border:none;color:var(--g400);font-size:12px;font-weight:600;
  padding:5px 12px;cursor:pointer;border-radius:4px;font-family:var(--font);transition:all .15s}
.tab-btn:hover{color:#fff;background:var(--g800)}
.tab-btn.active{color:#fff;background:var(--red)}
.tab-btn.reset{color:#f87171;font-size:11px}

/* MAIN */
main{max-width:1280px;margin:0 auto;padding:20px}
.panel{display:none}.panel.active{display:block}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.card{background:#fff;border-radius:8px;padding:14px 18px;border:1px solid var(--g200)}
.card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g600);margin-bottom:4px}
.card-value{font-size:26px;font-weight:700;font-family:var(--mono);line-height:1}
.card-value.warn{color:var(--warn)}.card-value.danger{color:var(--danger)}.card-value.ok{color:var(--ok)}
.card-sub{font-size:11px;color:var(--g400);margin-top:3px}

/* TABLE */
.tbl-wrap{background:#fff;border-radius:8px;border:1px solid var(--g200);overflow:hidden;margin-bottom:20px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--g900);color:#fff}
thead th{padding:9px 13px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--g200)}
tbody tr:last-child{border-bottom:none}
tbody td{padding:9px 13px;vertical-align:middle}
.mono{font-family:var(--mono);font-size:12px}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.bd{background:var(--danger-bg);color:var(--danger)}
.bw{background:var(--warn-bg);color:var(--warn)}
.bo{background:var(--ok-bg);color:var(--ok)}
.bg{background:var(--g200);color:var(--g600)}

/* LOC TABS */
.loc-tabs{display:flex;gap:4px;margin-bottom:14px;background:#fff;border-radius:8px;
  padding:4px;border:1px solid var(--g200);width:fit-content}
.loc-btn{background:none;border:none;padding:5px 14px;font-size:12px;font-weight:600;
  cursor:pointer;border-radius:5px;color:var(--g600);font-family:var(--font);transition:all .15s;letter-spacing:.03em}
.loc-btn:hover{background:var(--g100);color:var(--black)}
.loc-btn.active{background:var(--red);color:#fff}

/* FORMS */
.form-card{background:#fff;border:1px solid var(--g200);border-radius:8px;padding:18px;margin-bottom:18px}
.form-card h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--g600);margin-bottom:14px;padding-bottom:10px;border-top:1px solid var(--g200);padding-top:0;border-top:none;border-bottom:1px solid var(--g200)}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--g600)}
input,select{border:1px solid var(--g200);border-radius:5px;padding:7px 10px;font-size:13px;
  font-family:var(--font);background:#fff;color:var(--black);outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus{border-color:var(--red)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:12px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:5px;
  padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);
  transition:all .15s;white-space:nowrap}
.btn-p{background:var(--red);color:#fff}.btn-p:hover{background:var(--red-dk)}
.btn-g{background:var(--g200);color:var(--black)}.btn-g:hover{filter:brightness(.95)}
.btn-d{background:var(--danger-bg);color:var(--danger)}
.btn-sm{padding:3px 9px;font-size:11px}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{padding-left:34px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--g400)}

/* SECTION HEADER */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sh-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g600)}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--g400);font-size:13px}
.empty strong{display:block;font-size:15px;color:var(--g600);margin-bottom:5px}

/* PROGRESS BAR */
.bar-wrap{display:flex;align-items:center;gap:6px}
.bar-bg{flex:1;height:5px;background:var(--g200);border-radius:3px;overflow:hidden;min-width:50px}
.bar-fill{height:100%;border-radius:3px}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);overflow-y:auto;padding:20px}
.modal{background:#fff;max-width:680px;margin:0 auto;border-radius:10px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.modal-hdr{background:var(--black);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.modal-hdr-info{font-size:10px;color:var(--g400);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.modal-hdr h2{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;color:var(--g400);font-size:22px;cursor:pointer;line-height:1;padding:0 4px}
.modal-body{padding:18px}
.modal-section{border-top:1px solid var(--g200);padding-top:14px;margin-bottom:16px}
.modal-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g600);margin-bottom:10px}
.count-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:4px}
.count-card{border:1px solid var(--g200);border-radius:7px;padding:10px}
.count-card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g600);margin-bottom:6px}
.count-card input{width:80px;text-align:center;font-size:17px;font-weight:700;font-family:var(--mono);padding:5px}
.row-end{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.hint{font-size:11px;color:var(--g400);margin-top:5px}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--g900);color:#fff;
  padding:10px 16px;border-radius:6px;font-size:13px;z-index:9999;
  box-shadow:0 4px 12px rgba(0,0,0,.3);display:flex;align-items:center;gap:10px}
.toast-undo{background:rgba(255,255,255,.15);border:none;color:#fff;font-weight:700;
  cursor:pointer;padding:2px 8px;border-radius:3px;font-size:11px;font-family:var(--font)}
</style>
</head>
<body>

<header>
  <div class="logo">MFC <span>✚</span></div>
  <h1>Supply Tracker</h1>
  <div class="header-right">
    <button class="tab-btn active" id="tb-dashboard" onclick="showPanel('dashboard')">Dashboard</button>
    <button class="tab-btn" id="tb-inventory" onclick="showPanel('inventory')">Inventory</button>
    <button class="tab-btn" id="tb-expirations" onclick="showPanel('expirations')">Expirations</button>
    <button class="tab-btn" id="tb-items" onclick="showPanel('items')">Items &amp; Pars</button>
    <button class="tab-btn" id="tb-report" onclick="showPanel('report')">Report</button>
    <button class="tab-btn reset" onclick="resetData()">↺ Reset</button>
    <button class="tab-btn" id="sync-save-btn" onclick="saveToOneDrive()" style="color:#60a5fa;font-size:11px;">☁ Save</button>
    <button class="tab-btn" id="sync-load-btn" onclick="loadFromOneDrive()" style="color:#60a5fa;font-size:11px;">☁ Load</button>
    <span id="sync-status" style="font-size:10px;color:var(--g400);margin-left:4px;"></span>
  </div>
</header>

<!-- ITEM MODAL -->
<div id="modal-overlay">
  <div class="modal">
    <div class="modal-hdr">
      <div><div class="modal-hdr-info">Item Detail</div><h2 id="modal-name"></h2></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <!-- COUNTS -->
      <div class="modal-section-title" style="margin-top:4px">Stock Counts — click to edit</div>
      <div class="count-grid" id="modal-counts"></div>

      <!-- LOG REMOVAL -->
      <div class="modal-section">
        <div class="modal-section-title">Log Removal / Usage</div>
        <div class="grid3" style="margin-bottom:8px">
          <div class="fg">
            <label>Location</label>
            <select id="rm-loc" onchange="refreshRemovalLots()">
              <option value="KIUA">KIUA</option><option value="NK71">NK71</option>
              <option value="KRME">KRME</option><option value="BACK">Backstock</option>
            </select>
          </div>
          <div class="fg">
            <label>Lot / Expiration</label>
            <select id="rm-lot"><option value="">— no lots —</option></select>
          </div>
          <div class="fg">
            <label>Qty Removed</label>
            <input type="number" id="rm-qty" min="1" placeholder="0">
          </div>
        </div>
        <div class="row-end">
          <button class="btn btn-p" onclick="logRemoval()">− Log Removal</button>
          <span class="hint" id="rm-hint"></span>
        </div>
      </div>

      <!-- MOVE STOCK -->
      <div class="modal-section">
        <div class="modal-section-title">Move Stock Between Locations</div>
        <div class="grid4" style="margin-bottom:8px">
          <div class="fg">
            <label>From</label>
            <select id="mv-from" onchange="refreshMoveLots()">
              <option value="KIUA">KIUA</option><option value="NK71">NK71</option>
              <option value="KRME">KRME</option><option value="BACK">Backstock</option>
            </select>
          </div>
          <div class="fg">
            <label>To</label>
            <select id="mv-to">
              <option value="BACK">Backstock</option><option value="KIUA">KIUA</option>
              <option value="NK71">NK71</option><option value="KRME">KRME</option>
            </select>
          </div>
          <div class="fg">
            <label>Lot to Move</label>
            <select id="mv-lot"><option value="ALL">— All / none recorded —</option></select>
          </div>
          <div class="fg">
            <label>Qty</label>
            <input type="number" id="mv-qty" min="1" placeholder="0">
          </div>
        </div>
        <div class="row-end">
          <button class="btn btn-p" onclick="moveStock()">↔ Move</button>
          <span class="hint" id="mv-hint"></span>
        </div>
      </div>

      <!-- EXPIRATION LOTS -->
      <div class="modal-section">
        <div class="modal-section-title">Expiration Lots</div>
        <div id="modal-exp-list" style="margin-bottom:10px"></div>
        <div class="grid4" style="margin-bottom:8px">
          <div class="fg">
            <label>Location</label>
            <select id="ae-loc">
              <option value="KIUA">KIUA</option><option value="NK71">NK71</option>
              <option value="KRME">KRME</option><option value="BACK">Backstock</option>
            </select>
          </div>
          <div class="fg"><label>Lot #</label><input type="text" id="ae-lot" placeholder="optional"></div>
          <div class="fg"><label>Exp Date</label><input type="date" id="ae-date"></div>
          <div class="fg"><label>Qty</label><input type="number" id="ae-qty" min="1" placeholder="0"></div>
        </div>
        <button class="btn btn-p btn-sm" onclick="addExpLot()">+ Add Lot</button>
      </div>

    </div>
  </div>
</div>

<main>

<!-- DASHBOARD -->
<div id="panel-dashboard" class="panel active">
  <div class="cards" id="dash-cards"></div>
  <div class="sh"><span class="sh-title">⚠ Needs Ordering</span></div>
  <div class="tbl-wrap" id="dash-order"></div>
  <div class="sh" style="margin-top:20px"><span class="sh-title">⏰ Expiring Within 30 Days</span></div>
  <div class="tbl-wrap" id="dash-exp"></div>
  <div class="sh" style="margin-top:20px"><span class="sh-title">↔ Transfer Opportunities</span></div>
  <div class="tbl-wrap" id="dash-xfer"></div>
</div>

<!-- INVENTORY -->
<div id="panel-inventory" class="panel">
  <div class="loc-tabs" id="inv-loc-tabs">
    <button class="loc-btn active" onclick="setInvLoc('ALL',this)">All</button>
    <button class="loc-btn" onclick="setInvLoc('KIUA',this)">KIUA</button>
    <button class="loc-btn" onclick="setInvLoc('NK71',this)">NK71</button>
    <button class="loc-btn" onclick="setInvLoc('KRME',this)">KRME</button>
    <button class="loc-btn" onclick="setInvLoc('BACK',this)">Backstock</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="inv-search" placeholder="Search items — click any row to edit counts, lots, and more" oninput="renderInvTable()">
  </div>
  <div class="tbl-wrap" id="inv-table"></div>
</div>

<!-- EXPIRATIONS -->
<div id="panel-expirations" class="panel">
  <div class="loc-tabs">
    <button class="loc-btn active" onclick="setExpFilter('ALL',this)">All</button>
    <button class="loc-btn" onclick="setExpFilter('30',this)">Expires &lt;30d</button>
    <button class="loc-btn" onclick="setExpFilter('60',this)">Expires &lt;60d</button>
    <button class="loc-btn" onclick="setExpFilter('EXPIRED',this)">Expired</button>
  </div>
  <div class="tbl-wrap" id="exp-table"></div>
</div>

<!-- ITEMS & PARS -->
<div id="panel-items" class="panel">
  <div class="form-card">
    <h3>Add New Item</h3>
    <div class="grid2">
      <div class="fg"><label>Item Name</label><input type="text" id="new-name" placeholder="e.g. 18g IV Catheter"></div>
      <div class="fg"><label>Category</label><input type="text" id="new-cat" placeholder="e.g. Vascular Access"></div>
    </div>
    <div class="grid4">
      <div class="fg"><label>KIUA Par</label><input type="number" id="new-par-KIUA" min="0" placeholder="0"></div>
      <div class="fg"><label>NK71 Par</label><input type="number" id="new-par-NK71" min="0" placeholder="0"></div>
      <div class="fg"><label>KRME Par</label><input type="number" id="new-par-KRME" min="0" placeholder="0"></div>
      <div class="fg"><label>Backstock Par</label><input type="number" id="new-par-BACK" min="0" placeholder="0"></div>
    </div>
    <button class="btn btn-p" onclick="addItem()">Add Item</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="items-search" placeholder="Search items..." oninput="renderItemsTable()">
  </div>
  <div class="tbl-wrap" id="items-table"></div>
</div>

<!-- REPORT -->
<div id="panel-report" class="panel">
  <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-p" onclick="window.print()">🖨 Print</button>
    <button class="btn btn-g" onclick="exportCSV()">⬇ Export CSV</button>
    <span style="font-size:12px;color:var(--g400)" id="report-date"></span>
  </div>
  <div id="report-body"></div>
</div>

</main>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

function lss(k,v){localStorage.setItem('mfc_'+k,JSON.stringify(v))}

function getItems(){return ls('items')||[]}
function getInv(){return ls('inventory')||[]}
function getExps(){return ls('expirations')||[]}
function setItems(d){lss('items',d)}
function setInv(d){lss('inventory',d)}
function setExps(d){lss('expirations',d)}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

function getCount(itemId,loc){
  const r=getInv().find(i=>i.itemId===itemId&&i.location===loc);
  return r?r.count:0;
}
function getPar(item,loc){return (item.pars&&item.pars[loc])||0}
function daysUntil(ds){
  const t=new Date();t.setHours(0,0,0,0);
  return Math.round((new Date(ds+'T00:00:00')-t)/86400000);
}
function fmtDate(ds){
  if(!ds)return'—';
  const[y,m,d]=ds.split('-');return m+'/'+d+'/'+y;
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg,snap){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='toast';
  t.innerHTML=msg+(snap?'<button class="toast-undo" onclick="undoSnap(this)">UNDO</button>':'');
  if(snap)t._snap=snap;
  document.body.appendChild(t);
  t._tid=setTimeout(()=>t.remove(),4000);
}
function undoSnap(btn){
  const t=btn.closest('.toast');
  if(!t||!t._snap)return;
  clearTimeout(t._tid);
  const s=t._snap;
  lss('items',JSON.parse(s.items));
  lss('inventory',JSON.parse(s.inv));
  lss('expirations',JSON.parse(s.exps));
  t.remove();
  toast('Restored.');
  renderAll();
}
function snap(){return{items:JSON.stringify(getItems()),inv:JSON.stringify(getInv()),exps:JSON.stringify(getExps())}}

// ── PANEL NAV ─────────────────────────────────────────────────────────────────
function showPanel(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn:not(.reset)').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('tb-'+name).classList.add('active');
  if(name==='dashboard')renderDash();
  if(name==='inventory')renderInvTable();
  if(name==='expirations')renderExpTable();
  if(name==='items')renderItemsTable();
  if(name==='report')renderReport();
}
function renderAll(){
  renderDash();renderInvTable();renderExpTable();renderItemsTable();
}

// ── RESET ─────────────────────────────────────────────────────────────────────
function resetData(){
  if(!confirm('Replace ALL data with the imported catalog? Counts and expiration entries will be cleared.'))return;
  localStorage.removeItem('mfc_items');
  localStorage.removeItem('mfc_inventory');
  localStorage.removeItem('mfc_expirations');
  location.reload();
}

// ── INVENTORY PANEL ───────────────────────────────────────────────────────────
let invLoc='ALL';
let expFilter='ALL';

function setInvLoc(loc,btn){
  invLoc=loc;
  document.querySelectorAll('#inv-loc-tabs .loc-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderInvTable();
}
function setExpFilter(f,btn){
  expFilter=f;
  document.querySelectorAll('#panel-expirations .loc-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderExpTable();
}

function renderInvTable(){
  const items=getItems();
  const q=(document.getElementById('inv-search')||{}).value||'';
  const filtered=items.filter(i=>i.name.toLowerCase().includes(q.toLowerCase())||(i.category||'').toLowerCase().includes(q.toLowerCase()));
  const el=document.getElementById('inv-table');
  if(!filtered.length){el.innerHTML='<div class="empty"><strong>No items</strong>Add items in Items &amp; Pars first.</div>';return}
  const locs=invLoc==='ALL'?Object.keys(LOCS):[invLoc];
  const locHdrs=locs.map(l=>'<th style="text-align:center">'+l+'</th>').join('');
  const rows=filtered.map(item=>{
    const cells=locs.map(loc=>{
      const c=getCount(item.id,loc),p=getPar(item,loc);
      if(p===0&&c===0)return '<td style="text-align:center;color:#ddd">—</td>';
      const pct=p>0?Math.min(100,Math.round(c/p*100)):100;
      const col=pct>=75?'var(--ok)':pct>=40?'var(--warn)':'var(--danger)';
      return '<td style="text-align:center"><span style="font-family:var(--mono);font-weight:700;color:'+col+'">'+c+'</span>'+(p>0?'<span style="color:#bbb;font-size:11px">/'+p+'</span>':'')+'</td>';
    }).join('');
    const anyLow=locs.some(l=>{const p=getPar(item,l);return p>0&&getCount(item.id,l)<p});
    const hasExp=getExps().some(e=>e.itemId===item.id&&daysUntil(e.date)<=30);
    const alerts=(anyLow?'<span class="badge bd" style="margin-right:3px">Low</span>':'')+(hasExp?'<span class="badge bw">Exp</span>':'');
    return '<tr style="cursor:pointer" data-id="'+item.id+'"><td><strong>'+item.name+'</strong><br><span style="font-size:11px;color:var(--g400)">'+(item.category||'')+'</span></td>'+cells+'<td>'+alerts+'</td><td style="color:#ccc;font-size:16px;text-align:center">›</td></tr>';
  }).join('');
  el.innerHTML='<table><thead><tr><th>Item</th>'+locHdrs+'<th>Alerts</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
  el.querySelectorAll('tr[data-id]').forEach(tr=>{
    tr.addEventListener('click',()=>openModal(tr.dataset.id));
    tr.addEventListener('mouseenter',()=>{tr.style.background='#f9f9f9'});
    tr.addEventListener('mouseleave',()=>{tr.style.background=''});
  });
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
let modalItemId=null;

function openModal(id){
  modalItemId=id;
  const item=getItems().find(i=>i.id===id);
  if(!item)return;
  document.getElementById('modal-name').textContent=item.name;
  renderModalCounts();
  refreshRemovalLots();
  refreshMoveLots();
  renderModalExps();
  document.getElementById('modal-overlay').style.display='block';
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal-overlay').style.display='none';
  document.body.style.overflow='';
  modalItemId=null;
  renderInvTable();
}

document.getElementById('modal-overlay').addEventListener('click',function(e){
  if(e.target===this)closeModal();
});

function renderModalCounts(){
  const item=getItems().find(i=>i.id===modalItemId);
  if(!item)return;
  document.getElementById('modal-counts').innerHTML=Object.entries(LOCS).map(function(entry){
    const loc=entry[0],label=entry[1];
    const c=getCount(modalItemId,loc),p=getPar(item,loc);
    const pct=p>0?Math.min(100,Math.round(c/p*100)):null;
    const col=pct===null?'#333':pct>=75?'var(--ok)':pct>=40?'var(--warn)':'var(--danger)';
    const bar=pct!==null?'<div style="height:4px;background:var(--g200);border-radius:2px;overflow:hidden;margin-top:5px"><div style="height:100%;width:'+pct+'%;background:'+col+'"></div></div>':'';
    return '<div class="count-card"><div class="count-card-label">'+label+'</div><div style="display:flex;align-items:center;gap:6px"><input type="number" min="0" value="'+c+'" data-loc="'+loc+'" style="color:'+col+'" onchange="setCount(\''+loc+'\',this.value)"><span style="font-size:12px;color:var(--g400)">/ '+(p||'—')+'</span></div>'+bar+'</div>';
  }).join('');
}

function setCount(loc,val){
  const count=parseInt(val)||0;
  const inv=getInv();
  const idx=inv.findIndex(i=>i.itemId===modalItemId&&i.location===loc);
  if(idx>=0)inv[idx].count=count;else inv.push({itemId:modalItemId,location:loc,count:count});
  setInv(inv);
  toast('Count updated.');
}

function refreshRemovalLots(){
  const loc=document.getElementById('rm-loc').value;
  const exps=getExps().filter(function(e){return e.itemId===modalItemId&&e.location===loc&&e.qty>0});
  exps.sort(function(a,b){return a.date.localeCompare(b.date)});
  const sel=document.getElementById('rm-lot');
  const hint=document.getElementById('rm-hint');
  if(exps.length){
    sel.innerHTML=exps.map(function(e){return '<option value="'+e.id+'">'+(e.lot?e.lot+' — ':'')+'Exp '+fmtDate(e.date)+' ('+e.qty+' avail)</option>'}).join('');
    hint.textContent='Oldest lot pre-selected. Qty reduces that lot.';
  }else{
    sel.innerHTML='<option value="">— no lots recorded —</option>';
    hint.textContent='No lots at this location — count only will be updated.';
  }
}

function logRemoval(){
  const loc=document.getElementById('rm-loc').value;
  const lotId=document.getElementById('rm-lot').value;
  const qty=parseInt(document.getElementById('rm-qty').value);
  if(!qty||qty<1){toast('Enter a quantity.');return}
  const exps=getExps();
  const lot=lotId?exps.find(function(e){return e.id===lotId}):null;
  if(!lotId){
    if(!confirm('No lots recorded at '+loc+'. Subtract from count only?'))return;
  }
  if(lot){
    if(qty>lot.qty){toast('Only '+lot.qty+' in this lot.');return}
    lot.qty-=qty;
    setExps(lot.qty===0?exps.filter(function(e){return e.id!==lotId}):exps);
  }
  const inv=getInv();
  const idx=inv.findIndex(function(i){return i.itemId===modalItemId&&i.location===loc});
  const cur=idx>=0?inv[idx].count:0;
  const nxt=Math.max(0,cur-qty);
  if(idx>=0)inv[idx].count=nxt;else inv.push({itemId:modalItemId,location:loc,count:nxt});
  setInv(inv);
  document.getElementById('rm-qty').value='';
  toast('Removed '+qty+(lot?' from lot '+(lot.lot||fmtDate(lot.date)):'')+' — '+nxt+' left at '+loc+'.');
  renderModalCounts();renderModalExps();refreshRemovalLots();
}

function refreshMoveLots(){
  const from=document.getElementById('mv-from').value;
  const exps=getExps().filter(function(e){return e.itemId===modalItemId&&e.location===from&&e.qty>0});
  exps.sort(function(a,b){return a.date.localeCompare(b.date)});
  const sel=document.getElementById('mv-lot');
  const hint=document.getElementById('mv-hint');
  if(exps.length){
    sel.innerHTML='<option value="ALL">— Move all lots proportionally —</option>'+
      exps.map(function(e){return '<option value="'+e.id+'">'+(e.lot?e.lot+' — ':'')+'Exp '+fmtDate(e.date)+' ('+e.qty+' avail)</option>'}).join('');
    hint.textContent='Select a specific lot to move just that lot, or move all proportionally.';
  }else{
    sel.innerHTML='<option value="ALL">— No lots recorded —</option>';
    hint.textContent='No lots at this location — only the count will be moved.';
  }
}

function moveStock(){
  const from=document.getElementById('mv-from').value;
  const to=document.getElementById('mv-to').value;
  const lotId=document.getElementById('mv-lot').value;
  const qty=parseInt(document.getElementById('mv-qty').value);
  if(!qty||qty<1){toast('Enter a quantity.');return}
  if(from===to){toast('From and To must be different.');return}
  const inv=getInv();
  const fi=inv.findIndex(function(i){return i.itemId===modalItemId&&i.location===from});
  const fc=fi>=0?inv[fi].count:0;
  if(qty>fc){toast('Only '+fc+' available at '+from+'.');return}
  if(fi>=0)inv[fi].count=fc-qty;else inv.push({itemId:modalItemId,location:from,count:0});
  const ti=inv.findIndex(function(i){return i.itemId===modalItemId&&i.location===to});
  if(ti>=0)inv[ti].count+=qty;else inv.push({itemId:modalItemId,location:to,count:qty});
  setInv(inv);
  // Move lots
  const exps=getExps();
  if(lotId&&lotId!=='ALL'){
    const lot=exps.find(function(e){return e.id===lotId});
    if(lot&&qty<=lot.qty){
      const ex=exps.find(function(e){return e.itemId===modalItemId&&e.location===to&&e.date===lot.date&&e.lot===lot.lot});
      if(ex)ex.qty+=qty;else exps.push({id:uid(),itemId:modalItemId,location:to,lot:lot.lot,date:lot.date,qty:qty});
      lot.qty-=qty;
      setExps(lot.qty===0?exps.filter(function(e){return e.id!==lotId}):exps);
    }else{setExps(exps)}
  }else{
    const here=exps.filter(function(e){return e.itemId===modalItemId&&e.location===from&&e.qty>0});
    here.sort(function(a,b){return a.date.localeCompare(b.date)});
    let rem=qty;
    here.forEach(function(lot){
      if(rem<=0)return;
      const take=Math.min(rem,lot.qty);
      const ex=exps.find(function(e){return e.itemId===modalItemId&&e.location===to&&e.date===lot.date&&e.lot===lot.lot});
      if(ex)ex.qty+=take;else exps.push({id:uid(),itemId:modalItemId,location:to,lot:lot.lot,date:lot.date,qty:take});
      lot.qty-=take;rem-=take;
    });
    setExps(exps.filter(function(e){return e.qty>0}));
  }
  document.getElementById('mv-qty').value='';
  toast('Moved '+qty+' from '+from+' to '+to+'. Lots updated.');
  renderModalCounts();renderModalExps();refreshMoveLots();refreshRemovalLots();
}

function renderModalExps(){
  const exps=getExps().filter(function(e){return e.itemId===modalItemId});
  exps.sort(function(a,b){return a.date.localeCompare(b.date)});
  const el=document.getElementById('modal-exp-list');
  if(!exps.length){el.innerHTML='<p style="font-size:13px;color:var(--g400);margin-bottom:8px">No lots recorded yet.</p>';return}
  el.innerHTML='<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px"><thead><tr style="background:var(--g100)"><th style="padding:5px 8px;text-align:left">Loc</th><th style="padding:5px 8px;text-align:left">Lot</th><th style="padding:5px 8px;text-align:left">Exp Date</th><th style="padding:5px 8px;text-align:left">Qty</th><th style="padding:5px 8px;text-align:left">Status</th><th></th></tr></thead><tbody>'+
    exps.map(function(e){
      const d=daysUntil(e.date);
      const st=d<0?'<span class="badge bd">Expired</span>':d<=30?'<span class="badge bd">'+d+'d</span>':d<=60?'<span class="badge bw">'+d+'d</span>':'<span class="badge bo">'+d+'d</span>';
      return '<tr style="border-bottom:1px solid var(--g200)"><td style="padding:5px 8px"><span class="badge bg">'+e.location+'</span></td><td style="padding:5px 8px;font-family:var(--mono)">'+(e.lot||'—')+'</td><td style="padding:5px 8px;font-family:var(--mono)">'+fmtDate(e.date)+'</td><td style="padding:5px 8px;font-family:var(--mono)">'+e.qty+'</td><td style="padding:5px 8px">'+st+'</td><td style="padding:5px 8px"><button class="btn btn-d btn-sm" data-expid="'+e.id+'">Remove</button></td></tr>';
    }).join('')+'</tbody></table>';
  el.querySelectorAll('[data-expid]').forEach(function(btn){
    btn.addEventListener('click',function(){
      setExps(getExps().filter(function(e){return e.id!==btn.dataset.expid}));
      renderModalExps();refreshRemovalLots();refreshMoveLots();toast('Lot removed.');
    });
  });
}

function addExpLot(){
  const loc=document.getElementById('ae-loc').value;
  const lot=document.getElementById('ae-lot').value.trim();
  const date=document.getElementById('ae-date').value;
  const qty=parseInt(document.getElementById('ae-qty').value);
  if(!date||!qty||qty<1){toast('Enter a date and quantity.');return}
  const exps=getExps();
  exps.push({id:uid(),itemId:modalItemId,location:loc,lot:lot,date:date,qty:qty});
  setExps(exps);
  document.getElementById('ae-lot').value='';
  document.getElementById('ae-date').value='';
  document.getElementById('ae-qty').value='';
  toast('Lot added.');
  renderModalExps();refreshRemovalLots();refreshMoveLots();
}

// ── EXPIRATIONS PANEL ─────────────────────────────────────────────────────────
function renderExpTable(){
  const items=getItems();
  let exps=getExps();
  if(expFilter==='30')exps=exps.filter(function(e){const d=daysUntil(e.date);return d>=0&&d<=30});
  else if(expFilter==='60')exps=exps.filter(function(e){const d=daysUntil(e.date);return d>=0&&d<=60});
  else if(expFilter==='EXPIRED')exps=exps.filter(function(e){return daysUntil(e.date)<0});
  exps.sort(function(a,b){return a.date.localeCompare(b.date)});
  const el=document.getElementById('exp-table');
  if(!exps.length){el.innerHTML='<div class="empty"><strong>Nothing here</strong>'+(expFilter==='ALL'?'Add lots via the Inventory tab.':'No items in this date range.')+'</div>';return}
  el.innerHTML='<table><thead><tr><th>Item</th><th>Location</th><th>Lot #</th><th>Exp Date</th><th>Qty</th><th>Status</th></tr></thead><tbody>'+
    exps.map(function(e){
      const item=items.find(function(i){return i.id===e.itemId});
      const d=daysUntil(e.date);
      const st=d<0?'<span class="badge bd">Expired '+Math.abs(d)+'d ago</span>':d<=30?'<span class="badge bd">'+d+'d left</span>':d<=60?'<span class="badge bw">'+d+'d left</span>':'<span class="badge bo">'+d+'d left</span>';
      return '<tr><td>'+(item?item.name:'Unknown')+'</td><td><span class="badge bg">'+e.location+'</span></td><td class="mono">'+(e.lot||'—')+'</td><td class="mono">'+fmtDate(e.date)+'</td><td class="mono">'+e.qty+'</td><td>'+st+'</td></tr>';
    }).join('')+'</tbody></table>';
}

// ── ITEMS & PARS PANEL ────────────────────────────────────────────────────────
function renderItemsTable(){
  const items=getItems();
  const q=(document.getElementById('items-search')||{}).value||'';
  const filtered=items.filter(function(i){return i.name.toLowerCase().includes(q.toLowerCase())||(i.category||'').toLowerCase().includes(q.toLowerCase())});
  const el=document.getElementById('items-table');
  if(!filtered.length){el.innerHTML='<div class="empty"><strong>No items</strong>Add one above.</div>';return}
  const rows=filtered.map(function(item){
    const pars=['KIUA','NK71','KRME','BACK'].map(function(l){
      return '<td><input type="number" min="0" value="'+(item.pars&&item.pars[l]?item.pars[l]:0)+'" data-id="'+item.id+'" data-loc="'+l+'" onchange="updatePar(this)" style="width:64px;text-align:center;padding:4px 6px;font-size:12px;font-family:var(--mono)"></td>';
    }).join('');
    return '<tr><td><strong>'+item.name+'</strong></td><td style="font-size:12px;color:var(--g600)">'+(item.category||'')+'</td>'+pars+'<td><button class="btn btn-d btn-sm" data-delid="'+item.id+'">Delete</button></td></tr>';
  }).join('');
  el.innerHTML='<table><thead><tr><th>Item</th><th>Category</th><th>KIUA Par</th><th>NK71 Par</th><th>KRME Par</th><th>Backstock Par</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
  el.querySelectorAll('[data-delid]').forEach(function(btn){
    btn.addEventListener('click',function(){deleteItem(btn.dataset.delid)});
  });
}

function updatePar(el){
  const id=el.dataset.id,loc=el.dataset.loc,val=parseInt(el.value)||0;
  const items=getItems();
  const item=items.find(function(i){return i.id===id});
  if(!item)return;
  if(!item.pars)item.pars={};
  item.pars[loc]=val;
  setItems(items);
}

function addItem(){
  const name=document.getElementById('new-name').value.trim();
  if(!name){toast('Enter an item name.');return}
  const items=getItems();
  if(items.find(function(i){return i.name.toLowerCase()===name.toLowerCase()})){toast('Item already exists.');return}
  const pars={};
  ['KIUA','NK71','KRME','BACK'].forEach(function(l){pars[l]=parseInt(document.getElementById('new-par-'+l).value)||0});
  items.push({id:uid(),name:name,category:document.getElementById('new-cat').value.trim()||'General',pars:pars});
  setItems(items);
  ['new-name','new-cat','new-par-KIUA','new-par-NK71','new-par-KRME','new-par-BACK'].forEach(function(id){document.getElementById(id).value=''});
  toast('Item added.');
  renderItemsTable();
}

function deleteItem(id){
  const s=snap();
  const items=getItems();
  const item=items.find(function(i){return i.id===id});
  setItems(items.filter(function(i){return i.id!==id}));
  setInv(getInv().filter(function(i){return i.itemId!==id}));
  setExps(getExps().filter(function(e){return e.itemId!==id}));
  renderItemsTable();
  toast('Deleted "'+item.name+'"',s);
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDash(){
  const items=getItems();
  const exps=getExps();
  let belowPar=0,expSoon=0,expired=0;
  const orderRows=[],expRows=[],xferRows=[];

  items.forEach(function(item){
    Object.keys(LOCS).forEach(function(loc){
      const c=getCount(item.id,loc),p=getPar(item,loc);
      if(p>0&&c<p){belowPar++;orderRows.push({item:item,loc:loc,c:c,p:p,need:p-c})}
    });
  });

  exps.forEach(function(e){
    const d=daysUntil(e.date);
    if(d<0)expired++;
    else if(d<=30){
      expSoon++;
      const item=items.find(function(i){return i.id===e.itemId});
      expRows.push({e:e,item:item,days:d});
    }
  });

  items.forEach(function(item){
    const bl=['KIUA','NK71','KRME'];
    const low=bl.filter(function(l){const p=getPar(item,l);return p>0&&getCount(item.id,l)<p*0.5});
    const high=bl.filter(function(l){const p=getPar(item,l);return p>0&&getCount(item.id,l)>p});
    if(low.length&&high.length)xferRows.push({item:item,low:low.join(', '),high:high.join(', ')});
  });

  document.getElementById('dash-cards').innerHTML=[
    {label:'Items Tracked',val:items.length,cls:'',sub:'in catalog'},
    {label:'Below Par',val:belowPar,cls:belowPar?'danger':'ok',sub:'location-item combos'},
    {label:'Expiring <30d',val:expSoon,cls:expSoon?'warn':'ok',sub:'lots to watch'},
    {label:'Expired Lots',val:expired,cls:expired?'danger':'ok',sub:'remove from service'},
    {label:'Transfer Opps',val:xferRows.length,cls:xferRows.length?'warn':'ok',sub:'before ordering'},
  ].map(function(c){return '<div class="card"><div class="card-label">'+c.label+'</div><div class="card-value '+c.cls+'">'+c.val+'</div><div class="card-sub">'+c.sub+'</div></div>'}).join('');

  const oEl=document.getElementById('dash-order');
  oEl.innerHTML=orderRows.length?'<table><thead><tr><th>Item</th><th>Location</th><th>On Hand</th><th>Par</th><th>Order Qty</th></tr></thead><tbody>'+
    orderRows.map(function(r){return '<tr><td>'+r.item.name+'</td><td><span class="badge bg">'+r.loc+'</span></td><td class="mono">'+r.c+'</td><td class="mono">'+r.p+'</td><td><span class="badge bd">+'+r.need+'</span></td></tr>'}).join('')+'</tbody></table>':
    '<div class="empty"><strong>All stocked up</strong>Nothing below par.</div>';

  expRows.sort(function(a,b){return a.days-b.days});
  const eEl=document.getElementById('dash-exp');
  eEl.innerHTML=expRows.length?'<table><thead><tr><th>Item</th><th>Location</th><th>Lot</th><th>Exp Date</th><th>Qty</th><th>Days Left</th></tr></thead><tbody>'+
    expRows.map(function(r){return '<tr><td>'+(r.item?r.item.name:'?')+'</td><td><span class="badge bg">'+r.e.location+'</span></td><td class="mono">'+(r.e.lot||'—')+'</td><td class="mono">'+fmtDate(r.e.date)+'</td><td class="mono">'+r.e.qty+'</td><td><span class="badge bd">'+r.days+'d</span></td></tr>'}).join('')+'</tbody></table>':
    '<div class="empty"><strong>Nothing expiring soon</strong>Clear within 30 days.</div>';

  const tEl=document.getElementById('dash-xfer');
  tEl.innerHTML=xferRows.length?'<table><thead><tr><th>Item</th><th>Move From (overstocked)</th><th>Move To (low)</th></tr></thead><tbody>'+
    xferRows.map(function(r){return '<tr><td>'+r.item.name+'</td><td><span class="badge bo">'+r.high+'</span></td><td><span class="badge bd">'+r.low+'</span></td></tr>'}).join('')+'</tbody></table>':
    '<div class="empty"><strong>No transfers needed</strong>Stock is balanced.</div>';
}

// ── REPORT ────────────────────────────────────────────────────────────────────
function renderReport(){
  const items=getItems(),exps=getExps();
  document.getElementById('report-date').textContent='Generated '+new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const orderRows=[],expRows=[];
  items.forEach(function(item){
    Object.keys(LOCS).forEach(function(loc){
      const c=getCount(item.id,loc),p=getPar(item,loc);
      if(p>0&&c<p)orderRows.push({name:item.name,loc:loc,c:c,p:p,need:p-c});
    });
  });
  exps.forEach(function(e){
    const d=daysUntil(e.date);
    if(d<=30){const item=items.find(function(i){return i.id===e.itemId});expRows.push({name:item?item.name:'?',e:e,days:d})}
  });
  expRows.sort(function(a,b){return a.days-b.days});
  document.getElementById('report-body').innerHTML=
    '<div style="margin-bottom:28px"><div style="font-size:17px;font-weight:700;margin-bottom:4px">📋 Order Report <span style="font-size:13px;font-weight:400;color:var(--g400)">'+orderRows.length+' items</span></div>'+
    '<div style="font-size:12px;color:var(--g400);margin-bottom:12px">Items below par level</div>'+
    '<div class="tbl-wrap">'+(orderRows.length?'<table><thead><tr><th>Item</th><th>Location</th><th>On Hand</th><th>Par</th><th>Order Qty</th></tr></thead><tbody>'+
    orderRows.map(function(r){return '<tr><td>'+r.name+'</td><td>'+LOCS[r.loc]+'</td><td class="mono">'+r.c+'</td><td class="mono">'+r.p+'</td><td class="mono"><strong>'+r.need+'</strong></td></tr>'}).join('')+'</tbody></table>':
    '<div class="empty"><strong>Nothing to order</strong>All at or above par.</div>')+'</div></div>'+
    '<div><div style="font-size:17px;font-weight:700;margin-bottom:4px">⏰ Expiration Report <span style="font-size:13px;font-weight:400;color:var(--g400)">'+expRows.length+' lots</span></div>'+
    '<div style="font-size:12px;color:var(--g400);margin-bottom:12px">Lots expiring within 30 days</div>'+
    '<div class="tbl-wrap">'+(expRows.length?'<table><thead><tr><th>Item</th><th>Location</th><th>Lot</th><th>Exp Date</th><th>Qty</th><th>Days Left</th></tr></thead><tbody>'+
    expRows.map(function(r){return '<tr><td>'+r.name+'</td><td>'+LOCS[r.e.location]+'</td><td class="mono">'+(r.e.lot||'—')+'</td><td class="mono">'+fmtDate(r.e.date)+'</td><td class="mono">'+r.e.qty+'</td><td><span class="badge '+(r.days<0?'bd':r.days<=14?'bd':'bw')+'">'+r.days+'d</span></td></tr>'}).join('')+'</tbody></table>':
    '<div class="empty"><strong>No upcoming expirations</strong>Nothing within 30 days.</div>')+'</div></div>';
}

function exportCSV(){
  const items=getItems();
  const rows=[['Item','Location','On Hand','Par','Need to Order']];
  items.forEach(function(item){
    Object.keys(LOCS).forEach(function(loc){
      const c=getCount(item.id,loc),p=getPar(item,loc);
      if(p>0||c>0)rows.push([item.name,LOCS[loc],c,p,p>c?p-c:0]);
    });
  });
  const csv=rows.map(function(r){return r.map(function(v){return'"'+v+'"'}).join(',')}).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv,'+encodeURIComponent(csv);
  a.download='MFC-Inventory-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV exported.');
}

// ── ONEDRIVE SYNC ────────────────────────────────────────────────────────────
const MSAL_CONFIG = {
  auth: {
    clientId: "953c5e48-e1fd-4198-888f-2453dd38cb0a",
    authority: "https://login.microsoftonline.com/c695cf66-c7a1-4c10-9de3-c944f31683c9",
    redirectUri: window.location.href.split('?')[0]
  },
  cache: { cacheLocation: "localStorage", storeAuthStateInCookie: false }
};

let msalInstance = null;
const ONEDRIVE_FILE = "MFC-Supply-Tracker-Data.json";

function getMsal() {
  if (!msalInstance) msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);
  return msalInstance;
}

async function getToken() {
  const app = getMsal();
  await app.initialize();
  const accounts = app.getAllAccounts();
  const req = { scopes: ["Files.ReadWrite", "User.Read"] };
  try {
    if (accounts.length > 0) {
      const res = await app.acquireTokenSilent({ ...req, account: accounts[0] });
      return res.accessToken;
    }
  } catch(e) {}
  const res = await app.acquireTokenPopup(req);
  return res.accessToken;
}

function setSyncStatus(msg, color) {
  const el = document.getElementById('sync-status');
  if (el) { el.textContent = msg; el.style.color = color || 'var(--g400)'; }
}

async function saveToOneDrive() {
  setSyncStatus('Saving...', '#60a5fa');
  try {
    const token = await getToken();
    const data = {
      savedAt: new Date().toISOString(),
      items: getItems(),
      inventory: getInv(),
      expirations: getExps()
    };
    const res = await fetch(
      'https://graph.microsoft.com/v1.0/me/drive/root:/MFC Supply Tracker/' + ONEDRIVE_FILE + ':/content',
      {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      }
    );
    if (!res.ok) throw new Error('Save failed: ' + res.status);
    const saved = new Date().toLocaleTimeString();
    setSyncStatus('Saved ' + saved, '#16a34a');
    toast('Data saved to OneDrive.');
  } catch(e) {
    setSyncStatus('Save failed', '#dc2626');
    toast('Save failed: ' + e.message);
    console.error(e);
  }
}

async function loadFromOneDrive() {
  setSyncStatus('Loading...', '#60a5fa');
  try {
    const token = await getToken();
    const res = await fetch(
      'https://graph.microsoft.com/v1.0/me/drive/root:/MFC Supply Tracker/' + ONEDRIVE_FILE + ':/content',
      { headers: { 'Authorization': 'Bearer ' + token } }
    );
    if (res.status === 404) { setSyncStatus('No cloud save found', '#d97706'); toast('No saved data found on OneDrive yet. Save first.'); return; }
    if (!res.ok) throw new Error('Load failed: ' + res.status);
    const data = await res.json();
    if (data.items) setItems(data.items);
    if (data.inventory) setInv(data.inventory);
    if (data.expirations) setExps(data.expirations);
    const savedAt = data.savedAt ? ' (saved ' + new Date(data.savedAt).toLocaleString() + ')' : '';
    setSyncStatus('Loaded' + savedAt, '#16a34a');
    toast('Data loaded from OneDrive.');
    renderAll();
  } catch(e) {
    setSyncStatus('Load failed', '#dc2626');
    toast('Load failed: ' + e.message);
    console.error(e);
  }
}

renderDash();
